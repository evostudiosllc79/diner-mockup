<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc1020"/>
      <stop offset="100%" stop-color="#8b0010"/>
    </radialGradient>
    <radialGradient id="yellowGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </radialGradient>
  </defs>

  <!-- Outer red circle -->
  <circle cx="200" cy="200" r="188" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="188" fill="none" stroke="#d4af37" stroke-width="6"/>
  <circle cx="200" cy="200" r="182" fill="none" stroke="#f5e070" stroke-width="2"/>

  <!-- Stars outer ring -->
  <text x="200" y="28"   text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="200" y="382"  text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="22"  y="206"  text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="378" y="206"  text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="63"  y="74"   text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="337" y="74"   text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="63"  y="337"  text-anchor="middle" font-size="14" fill="#FFD700">★</text>
  <text x="337" y="337"  text-anchor="middle" font-size="14" fill="#FFD700">★</text>

  <!-- Checkerboard ring -->
  <circle cx="200" cy="200" r="162" fill="none" stroke="#fff"   stroke-width="20" stroke-dasharray="25.4 25.4" stroke-dashoffset="0"/>
  <circle cx="200" cy="200" r="162" fill="none" stroke="#1a1a1a" stroke-width="20" stroke-dasharray="25.4 25.4" stroke-dashoffset="25.4"/>

  <!-- Inner dark ring -->
  <circle cx="200" cy="200" r="150" fill="#1a1a1a"/>
  <circle cx="200" cy="200" r="150" fill="none" stroke="#d4af37" stroke-width="3"/>

  <!-- Yellow center -->
  <circle cx="200" cy="200" r="132" fill="url(#yellowGrad)"/>
  <circle cx="200" cy="200" r="132" fill="none" stroke="#c8960a" stroke-width="2"/>
  <circle cx="200" cy="200" r="126" fill="none" stroke="#c8960a" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- DAN'S arc top -->
  <path id="topArc" d="M 88,196 A 112,112 0 0,1 312,196" fill="none"/>
  <text font-family="Arial Black,sans-serif" font-size="40" font-weight="900" fill="#cc1020" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">DAN'S</textPath>
  </text>

  <!-- Divider lines -->
  <line x1="108" y1="194" x2="292" y2="194" stroke="#cc1020" stroke-width="2.5"/>
  <line x1="108" y1="206" x2="292" y2="206" stroke="#cc1020" stroke-width="2.5"/>
  <circle cx="112" cy="200" r="4" fill="#cc1020"/>
  <circle cx="288" cy="200" r="4" fill="#cc1020"/>

  <!-- Center star -->
  <text x="200" y="213" text-anchor="middle" font-size="22" fill="#cc1020">★</text>

  <!-- DINER arc bottom -->
  <path id="botArc" d="M 88,204 A 112,112 0 0,0 312,204" fill="none"/>
  <text font-family="Arial Black,sans-serif" font-size="40" font-weight="900" fill="#cc1020" letter-spacing="3">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">DINER</textPath>
  </text>
</svg>
